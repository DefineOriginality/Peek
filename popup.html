<!DOCTYPE html><html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Peek Extension</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="header">
        <h2>Peek for TETR.IO</h2>
        <label for="show-advanced" class="advanced-toggle">
            <input type="checkbox" id="show-advanced">
            show advanced stats
        </label>
    </div>

    <label for="user">Enter a TETR.IO user:</label>

    <div class="input-group">
        <input type="text" id="user" placeholder="ex. NOXF" minlength="3" maxlength="16" autocomplete="off" spellcheck="false" required autofocus>
        <button type="button" id="fetch">Fetch Stats</button>
    </div>

    <div class="result">
        <p id="playstyle"></p>
        <small><p id="advanced-stats" hidden></p></small>
    </div>

    <div class="result">
        <p id="opponent"></p>
        <small><p id="suggestion"></p></small>
    </div>

    <footer>
        <p>
            Version 1.0.0. Not affiliated with osk or TETR.IO.
            Created by noxf. Special thanks to dan63 (Tetra Stats) for calcs and KyraCoding (TETR-VERGE) for the idea.
            <br>
            <a href="https://github.com/DefineOriginality/Peek" target="_blank" rel="noopener noreferrer">GitHub repo</a>
        </p>
    </footer>
</body>
</html>
